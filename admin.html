<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Portfolio Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">
  <main id="loginView" class="min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-sm bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm p-6">
      <h1 class="text-2xl font-bold">Portfolio Admin</h1>
      <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Enter the admin password to edit portfolio content.</p>
      <form id="loginForm" class="mt-6 space-y-4">
        <label class="block">
          <span class="text-sm font-medium">Password</span>
          <input id="passwordInput" type="password" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" autocomplete="current-password" required>
        </label>
        <p id="loginError" class="hidden text-sm text-red-600 dark:text-red-400">Incorrect password.</p>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition">Unlock Editor</button>
      </form>
      <a href="./index.html" class="mt-4 inline-block text-sm text-blue-600 dark:text-blue-400 hover:underline">Back to portfolio</a>
    </section>
  </main>

  <main id="adminView" class="hidden min-h-screen">
    <header class="sticky top-0 z-20 bg-white/90 dark:bg-gray-800/90 backdrop-blur border-b border-gray-200 dark:border-gray-700">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between gap-4">
        <h1 class="text-xl font-bold">Portfolio Editor</h1>
        <div class="flex items-center gap-2">
          <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-700 text-xl shadow-sm hover:shadow-md transition" aria-label="Toggle theme">☀️</button>
          <button id="exportDataBtn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition">Export Data</button>
          <a href="./index.html" class="bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 px-4 py-2 rounded-lg text-sm font-medium transition">Back to Site</a>
        </div>
      </div>
    </header>

    <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-sm overflow-hidden">
        <div class="flex border-b border-gray-200 dark:border-gray-700 overflow-x-auto" id="adminTabs">
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600 dark:text-blue-400 dark:border-blue-400" data-tab="hero">Hero</button>
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent hover:border-gray-300" data-tab="about">About</button>
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent hover:border-gray-300" data-tab="experience">Experience</button>
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent hover:border-gray-300" data-tab="projects">Projects</button>
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent hover:border-gray-300" data-tab="achievements">Achievements</button>
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent hover:border-gray-300" data-tab="contact">Contact</button>
          <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent hover:border-gray-300" data-tab="settings">Settings</button>
        </div>
        <div class="p-6 space-y-6" id="adminTabContent"></div>
        <div class="p-4 bg-blue-50 dark:bg-blue-900/30 border-t border-blue-100 dark:border-blue-800 text-sm text-blue-800 dark:text-blue-200">
          After editing, click <strong>Export Data</strong> to download <code>data.json</code>. Replace the file in your repo and push it so visitors see the changes.
        </div>
      </div>
    </section>
  </main>

  <script>
    (function() {
      const ADMIN_PASSWORD = 'admin123';
      const SEED_DATA = {
        hero: {
          name: "Alex Rivera",
          intro: "Fresh BSCS graduate passionate about building clean, user-centric software and exploring AI/ML.",
          resumeUrl: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf",
          lightPhoto: "https://via.placeholder.com/400x400/3b82f6/ffffff?text=Alex+Light",
          darkPhoto: "https://via.placeholder.com/400x400/1e293b/ffffff?text=Alex+Dark"
        },
        about: "I'm a recent Computer Science graduate with a strong foundation in full-stack development and machine learning. I love transforming complex problems into intuitive digital experiences. During my studies I contributed to open-source projects and completed internships focusing on React and Python.",
        experience: [
          { title: "Software Engineering Intern", org: "TechCorp Solutions", year: "Summer 2024", description: "Developed internal dashboard using React and Node.js, improving team productivity by 20%." },
          { title: "B.Sc. Computer Science", org: "University of Technology", year: "2021 - 2025", description: "Relevant coursework: Data Structures, AI, Web Development, Databases. GPA: 3.8/4.0" }
        ],
        projects: [
          { title: "TaskFlow Mobile", description: "A cross-platform task manager with real-time sync.", image: "https://via.placeholder.com/400x250/10b981/ffffff?text=TaskFlow", tags: ["Flutter", "Firebase"], liveUrl: "#", githubUrl: "#" },
          { title: "Analytics Dashboard", description: "Interactive dashboard for sales data visualization.", image: "https://via.placeholder.com/400x250/6366f1/ffffff?text=Dashboard", tags: ["React", "D3.js"], liveUrl: "#", githubUrl: "#" },
          { title: "Image Classifier ML", description: "CNN model for plant disease detection.", image: "https://via.placeholder.com/400x250/f59e0b/ffffff?text=ML+Model", tags: ["Python", "TensorFlow"], liveUrl: "#", githubUrl: "#" },
          { title: "Pixel Quest Game", description: "2D platformer built with Unity and C#.", image: "https://via.placeholder.com/400x250/ef4444/ffffff?text=Game", tags: ["Unity", "C#"], liveUrl: "#", githubUrl: "#" }
        ],
        achievements: [
          { title: "Dean's List 2024", description: "Awarded for academic excellence in Computer Science." },
          { title: "Hackathon Winner", description: "First place at University Hackathon 2024 with AI health app." }
        ],
        contact: {
          email: "alex.rivera@example.com",
          linkedin: "https://linkedin.com/in/alexrivera",
          github: "https://github.com/alexrivera"
        }
      };

      let currentData = JSON.parse(JSON.stringify(SEED_DATA));

      const htmlElement = document.documentElement;
      const loginView = document.getElementById('loginView');
      const adminView = document.getElementById('adminView');
      const loginForm = document.getElementById('loginForm');
      const passwordInput = document.getElementById('passwordInput');
      const loginError = document.getElementById('loginError');
      const themeToggle = document.getElementById('themeToggle');
      const exportDataBtn = document.getElementById('exportDataBtn');
      const adminTabs = document.getElementById('adminTabs');
      const adminTabContent = document.getElementById('adminTabContent');

      function saveToLocal(data) {
        localStorage.setItem('portfolio_admin_data', JSON.stringify(data));
      }

      function loadFromLocal() {
        const saved = localStorage.getItem('portfolio_admin_data');
        return saved ? JSON.parse(saved) : null;
      }

      function getThemePref() {
        return localStorage.getItem('theme') === 'dark' ? 'dark' : 'light';
      }

      function setThemePref(theme) {
        localStorage.setItem('theme', theme);
      }

      function applyTheme(theme) {
        if (theme === 'dark') {
          htmlElement.classList.add('dark');
          themeToggle.textContent = '🌙';
        } else {
          htmlElement.classList.remove('dark');
          themeToggle.textContent = '☀️';
        }
      }

      function toggleTheme() {
        const nextTheme = htmlElement.classList.contains('dark') ? 'light' : 'dark';
        applyTheme(nextTheme);
        setThemePref(nextTheme);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      async function loadData() {
        try {
          const response = await fetch('./data.json');
          if (response.ok) {
            currentData = { ...JSON.parse(JSON.stringify(SEED_DATA)), ...await response.json() };
          }
        } catch (error) {
          console.warn('data.json not found, using seed data');
        }

        const localData = loadFromLocal();
        if (localData) currentData = { ...currentData, ...localData };
      }

      function unlockAdmin() {
        loginView.classList.add('hidden');
        adminView.classList.remove('hidden');
        renderAdminTabs('hero');
      }

      function renderAdminTabs(activeTab) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          const isActive = btn.dataset.tab === activeTab;
          btn.classList.toggle('border-blue-600', isActive);
          btn.classList.toggle('text-blue-600', isActive);
          btn.classList.toggle('dark:text-blue-400', isActive);
          btn.classList.toggle('dark:border-blue-400', isActive);
          btn.classList.toggle('border-transparent', !isActive);
          btn.classList.toggle('hover:border-gray-300', !isActive);
        });

        const d = currentData;
        const formHtml = {
          hero: () => `
            <div class="space-y-4">
              <label class="block"><span class="text-sm font-medium">Name</span><input id="adminHeroName" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.hero?.name)}"></label>
              <label class="block"><span class="text-sm font-medium">Introduction</span><input id="adminHeroIntro" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.hero?.intro)}"></label>
              <label class="block"><span class="text-sm font-medium">Resume PDF URL</span><input id="adminResumeUrl" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.hero?.resumeUrl)}"></label>
              <label class="block"><span class="text-sm font-medium">Light Photo URL</span><input id="adminLightPhoto" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.hero?.lightPhoto)}"></label>
              <label class="block"><span class="text-sm font-medium">Dark Photo URL</span><input id="adminDarkPhoto" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.hero?.darkPhoto)}"></label>
              <button onclick="window.adminSaveHero()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">Save Hero</button>
            </div>`,
          about: () => `
            <div class="space-y-4">
              <label class="block"><span class="text-sm font-medium">About Text</span><textarea id="adminAbout" rows="6" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600">${escapeHtml(d.about)}</textarea></label>
              <button onclick="window.adminSaveAbout()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">Save About</button>
            </div>`,
          experience: () => `
            <div class="space-y-6">
              <div class="space-y-3">${(d.experience || []).map((exp, i) => `
                <div class="flex flex-col sm:flex-row sm:justify-between gap-3 border p-3 rounded dark:border-gray-600">
                  <div><strong>${escapeHtml(exp.title)}</strong> @ ${escapeHtml(exp.org)} (${escapeHtml(exp.year)})</div>
                  <div class="flex gap-3"><button onclick="window.adminEditExp(${i})" class="text-blue-600 dark:text-blue-400">Edit</button><button onclick="window.adminDeleteExp(${i})" class="text-red-500">Delete</button></div>
                </div>`).join('')}</div>
              <button onclick="window.adminAddExp()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">Add Entry</button>
            </div>`,
          projects: () => `
            <div class="space-y-6">
              <div class="grid gap-3">${(d.projects || []).map((p, i) => `
                <div class="flex flex-col sm:flex-row sm:justify-between gap-3 border p-3 rounded dark:border-gray-600">
                  <span>${escapeHtml(p.title)}</span>
                  <div class="flex gap-3"><button onclick="window.adminEditProj(${i})" class="text-blue-600 dark:text-blue-400">Edit</button><button onclick="window.adminDeleteProj(${i})" class="text-red-500">Delete</button></div>
                </div>`).join('')}</div>
              <button onclick="window.adminAddProj()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">Add Project</button>
            </div>`,
          achievements: () => `
            <div class="space-y-4">
              ${(d.achievements || []).map((a, i) => `
                <div class="flex flex-col sm:flex-row sm:justify-between gap-3 border p-3 rounded dark:border-gray-600">
                  <span>${escapeHtml(a.title)}</span>
                  <div class="flex gap-3"><button onclick="window.adminEditAch(${i})" class="text-blue-600 dark:text-blue-400">Edit</button><button onclick="window.adminDeleteAch(${i})" class="text-red-500">Delete</button></div>
                </div>`).join('')}
              <button onclick="window.adminAddAch()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">Add Achievement</button>
            </div>`,
          contact: () => `
            <div class="space-y-4">
              <label class="block"><span class="text-sm font-medium">Email</span><input id="adminEmail" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.contact?.email)}"></label>
              <label class="block"><span class="text-sm font-medium">LinkedIn</span><input id="adminLinkedin" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.contact?.linkedin)}"></label>
              <label class="block"><span class="text-sm font-medium">GitHub</span><input id="adminGithub" class="w-full mt-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600" value="${escapeHtml(d.contact?.github)}"></label>
              <button onclick="window.adminSaveContact()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg">Save Contact</button>
            </div>`,
          settings: () => `
            <div class="space-y-3 text-sm text-gray-600 dark:text-gray-400">
              <p>Theme preference saves automatically.</p>
              <button onclick="window.adminClearLocal()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg">Clear Local Edits</button>
            </div>`
        };

        adminTabContent.innerHTML = formHtml[activeTab] ? formHtml[activeTab]() : '';
      }

      window.adminSaveHero = () => {
        currentData.hero = {
          ...currentData.hero,
          name: document.getElementById('adminHeroName')?.value,
          intro: document.getElementById('adminHeroIntro')?.value,
          resumeUrl: document.getElementById('adminResumeUrl')?.value,
          lightPhoto: document.getElementById('adminLightPhoto')?.value,
          darkPhoto: document.getElementById('adminDarkPhoto')?.value,
        };
        saveToLocal(currentData);
        alert('Hero saved.');
      };

      window.adminSaveAbout = () => {
        currentData.about = document.getElementById('adminAbout')?.value;
        saveToLocal(currentData);
        alert('About saved.');
      };

      window.adminDeleteExp = (i) => {
        currentData.experience.splice(i, 1);
        saveToLocal(currentData);
        renderAdminTabs('experience');
      };

      window.adminAddExp = () => {
        const title = prompt('Title');
        const org = prompt('Organization');
        const year = prompt('Year');
        const description = prompt('Description');
        if (title) {
          currentData.experience.push({ title, org, year, description: description || '' });
          saveToLocal(currentData);
          renderAdminTabs('experience');
        }
      };

      window.adminEditExp = (i) => {
        const item = currentData.experience[i];
        const title = prompt('Title', item.title);
        const org = prompt('Organization', item.org);
        const year = prompt('Year', item.year);
        const description = prompt('Description', item.description);
        if (title) {
          currentData.experience[i] = { title, org, year, description };
          saveToLocal(currentData);
          renderAdminTabs('experience');
        }
      };

      window.adminDeleteProj = (i) => {
        currentData.projects.splice(i, 1);
        saveToLocal(currentData);
        renderAdminTabs('projects');
      };

      window.adminAddProj = () => {
        const title = prompt('Title');
        const description = prompt('Description');
        const image = prompt('Image URL');
        const tags = prompt('Tags (comma separated)');
        const liveUrl = prompt('Live URL');
        const githubUrl = prompt('GitHub URL');
        if (title) {
          currentData.projects.push({
            title,
            description,
            image,
            tags: tags ? tags.split(',').map(tag => tag.trim()).filter(Boolean) : [],
            liveUrl,
            githubUrl
          });
          saveToLocal(currentData);
          renderAdminTabs('projects');
        }
      };

      window.adminEditProj = (i) => {
        const item = currentData.projects[i];
        const title = prompt('Title', item.title);
        const description = prompt('Description', item.description);
        const image = prompt('Image URL', item.image);
        const tags = prompt('Tags (comma separated)', (item.tags || []).join(', '));
        const liveUrl = prompt('Live URL', item.liveUrl);
        const githubUrl = prompt('GitHub URL', item.githubUrl);
        if (title) {
          currentData.projects[i] = {
            title,
            description,
            image,
            tags: tags ? tags.split(',').map(tag => tag.trim()).filter(Boolean) : [],
            liveUrl,
            githubUrl
          };
          saveToLocal(currentData);
          renderAdminTabs('projects');
        }
      };

      window.adminDeleteAch = (i) => {
        currentData.achievements.splice(i, 1);
        saveToLocal(currentData);
        renderAdminTabs('achievements');
      };

      window.adminAddAch = () => {
        const title = prompt('Title');
        const description = prompt('Description');
        if (title) {
          currentData.achievements.push({ title, description });
          saveToLocal(currentData);
          renderAdminTabs('achievements');
        }
      };

      window.adminEditAch = (i) => {
        const item = currentData.achievements[i];
        const title = prompt('Title', item.title);
        const description = prompt('Description', item.description);
        if (title) {
          currentData.achievements[i] = { title, description };
          saveToLocal(currentData);
          renderAdminTabs('achievements');
        }
      };

      window.adminSaveContact = () => {
        currentData.contact = {
          email: document.getElementById('adminEmail')?.value,
          linkedin: document.getElementById('adminLinkedin')?.value,
          github: document.getElementById('adminGithub')?.value,
        };
        saveToLocal(currentData);
        alert('Contact saved.');
      };

      window.adminClearLocal = async () => {
        if (!confirm('Clear local admin edits?')) return;
        localStorage.removeItem('portfolio_admin_data');
        await loadData();
        renderAdminTabs('settings');
        alert('Local edits cleared.');
      };

      function exportData() {
        const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'data.json';
        a.click();
        URL.revokeObjectURL(url);
      }

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (passwordInput.value !== ADMIN_PASSWORD) {
          loginError.classList.remove('hidden');
          passwordInput.select();
          return;
        }
        loginError.classList.add('hidden');
        await loadData();
        unlockAdmin();
      });

      adminTabs.addEventListener('click', (event) => {
        if (event.target.classList.contains('tab-btn')) {
          renderAdminTabs(event.target.dataset.tab);
        }
      });

      themeToggle.addEventListener('click', toggleTheme);
      exportDataBtn.addEventListener('click', exportData);
      applyTheme(getThemePref());
    })();
  </script>
</body>
</html>
